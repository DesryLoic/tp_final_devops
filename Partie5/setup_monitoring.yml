# ==============================================================================
# ÉTAPE 1 : INSTALLATION DE NODE EXPORTER SUR TOUTES LES MACHINES (K3S + MONITOR)
# ==============================================================================
- name: Configuration des agents (Node Exporter)
  hosts: all
  become: yes
  tasks:
    - name: Mettre à jour le cache APT (Force IPv4)
      apt:
        update_cache: yes
      environment:
        Acquire::ForceIPv4: "true"

    - name: Installer prometheus-node-exporter
      apt:
        name: prometheus-node-exporter
        state: present
      environment:
        Acquire::ForceIPv4: "true"

    - name: S'assurer que Node Exporter est démarré et activé au boot
      systemd:
        name: prometheus-node-exporter
        state: started
        enabled: yes

# ==============================================================================
# ÉTAPE 2 : INSTALLATION DU CERVEAU (PROMETHEUS) ET DE L'AFFICHAGE (GRAFANA)
# ==============================================================================
- name: Configuration du serveur de Monitoring
  hosts: monitoring
  become: yes
  vars:
    ip_k3s: "{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}"

  tasks:
    # --- PROMETHEUS ---
    - name: Installer Prometheus
      apt:
        name: prometheus
        state: present
      environment:
        Acquire::ForceIPv4: "true"

    - name: Envoyer le fichier de configuration Prometheus
      template:
        src: ./prometheus.yml
        dest: /etc/prometheus/prometheus.yml
      notify: Restart Prometheus

    # --- GRAFANA ---
    - name: (Air-Gap) Télécharger Grafana sur le Runner (Local)
      delegate_to: localhost
      get_url:
        url: https://dl.grafana.com/oss/release/grafana_10.4.2_amd64.deb
        dest: /tmp/grafana.deb

    - name: (Air-Gap) Envoyer le paquet Grafana vers la VM
      copy:
        src: /tmp/grafana.deb
        dest: /tmp/grafana.deb

    - name: Installer Grafana depuis le fichier local (Instantané)
      apt:
        deb: /tmp/grafana.deb
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a
        NEEDRESTART_SUSPEND: 1

    # ==============================================================================
    # ÉTAPE 3 : AUTOMATISATION DE GRAFANA (PROVISIONING)
    # ==============================================================================
    - name: Configurer Prometheus comme Data Source
      copy:
        dest: /etc/grafana/provisioning/datasources/prometheus.yaml
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://localhost:9090
              isDefault: true
        owner: root
        group: grafana
        mode: '0640'

    - name: Configurer le fournisseur de Dashboards
      copy:
        dest: /etc/grafana/provisioning/dashboards/provider.yaml
        content: |
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              options:
                path: /var/lib/grafana/dashboards
        owner: root
        group: grafana
        mode: '0640'

    - name: Créer le dossier pour les dashboards
      file:
        path: /var/lib/grafana/dashboards
        state: directory
        owner: grafana
        group: grafana

    - name: (Air-Gap) Télécharger le Dashboard sur le Runner (Local)
      delegate_to: localhost
      get_url:
        url: https://grafana.com/api/dashboards/1860/revisions/latest/download
        dest: /tmp/node-exporter-full.json

    - name: (Air-Gap) Envoyer le Dashboard vers la VM
      copy:
        src: /tmp/node-exporter-full.json
        dest: /var/lib/grafana/dashboards/node-exporter-full.json
        owner: grafana
        group: grafana
      notify: Restart Grafana

    - name: S'assurer que Grafana est démarré et activé au boot
      systemd:
        name: grafana-server
        state: started
        enabled: yes

  handlers:
    - name: Restart Prometheus
      systemd:
        name: prometheus
        state: restarted

    - name: Restart Grafana
      systemd:
        name: grafana-server
        state: restarted
