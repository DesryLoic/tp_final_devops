---
# ==============================================================================
# ÉTAPE 1 : INSTALLATION DE NODE EXPORTER SUR TOUTES LES MACHINES (K3S + MONITOR)
# ==============================================================================
- name: Configuration des agents (Node Exporter)
  hosts: all
  become: yes
  tasks:
    - name: Mettre à jour le cache APT
      apt:
        update_cache: yes

    - name: Installer prometheus-node-exporter
      apt:
        name: prometheus-node-exporter
        state: present

    - name: S'assurer que Node Exporter est démarré et activé au boot
      systemd:
        name: prometheus-node-exporter
        state: started
        enabled: yes

# ==============================================================================
# ÉTAPE 2 : INSTALLATION DU CERVEAU (PROMETHEUS) ET DE L'AFFICHAGE (GRAFANA)
# ==============================================================================
- name: Configuration du serveur de Monitoring
  hosts: monitoring
  become: yes
  vars:
    ip_k3s: "{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}"

  tasks:
    # --- PROMETHEUS ---
    - name: Installer Prometheus
      apt:
        name: prometheus
        state: present

    - name: Envoyer le fichier de configuration Prometheus
      template:
        src: ./prometheus.yml
        dest: /etc/prometheus/prometheus.yml
      notify: Restart Prometheus

    # --- GRAFANA ---
    - name: Installer les dépendances pour Grafana
      apt:
        name:
          - apt-transport-https
          - software-properties-common
          - wget
          - gnupg
        state: present
        update_cache: yes

    - name: Créer le dossier pour la clé GPG
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Ajouter la clé de sécurité Grafana (Méthode moderne)
      shell: wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor | tee /etc/apt/keyrings/grafana.gpg > /dev/null
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Ajouter le dépôt officiel Grafana
      apt_repository:
        repo: deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main
        state: present
        filename: grafana

    - name: Installer Grafana (Mode 100% non-interactif)
      apt:
        name: grafana
        state: present
        update_cache: yes
        dpkg_options: 'force-confdef,force-confold'
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a
        NEEDRESTART_SUSPEND: 1

    # ==============================================================================
    # ÉTAPE 3 : AUTOMATISATION DE GRAFANA (PROVISIONING)
    # ==============================================================================
    - name: Configurer Prometheus comme Data Source dans Grafana
      copy:
        dest: /etc/grafana/provisioning/datasources/prometheus.yaml
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://localhost:9090
              isDefault: true
        owner: root
        group: grafana
        mode: '0640'

    - name: Configurer le fournisseur de Dashboards Grafana
      copy:
        dest: /etc/grafana/provisioning/dashboards/provider.yaml
        content: |
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              options:
                path: /var/lib/grafana/dashboards
        owner: root
        group: grafana
        mode: '0640'

    - name: Créer le dossier pour les dashboards
      file:
        path: /var/lib/grafana/dashboards
        state: directory
        owner: grafana
        group: grafana

    - name: Télécharger le Dashboard 1860 (Node Exporter Full)
      get_url:
        url: https://grafana.com/api/dashboards/1860/revisions/latest/download
        dest: /var/lib/grafana/dashboards/node-exporter-full.json
        owner: grafana
        group: grafana
      notify: Restart Grafana

    # --- DÉMARRAGE DE GRAFANA ---
    - name: S'assurer que Grafana est démarré et activé au boot
      systemd:
        name: grafana-server
        state: started
        enabled: yes

  # --- GESTIONNAIRES (HANDLERS) ---
  handlers:
    - name: Restart Prometheus
      systemd:
        name: prometheus
        state: restarted

    - name: Restart Grafana
      systemd:
        name: grafana-server
        state: restarted
